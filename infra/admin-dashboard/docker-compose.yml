version: '3.8'

services:
  admin_dashboard:
    build: .
    container_name: infra_admin_dashboard
    restart: unless-stopped
    environment:
      DB_HOST: infra_users_db
      DB_NAME: users_db
      DB_USER: users_user
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:80"
    networks:
      - infra_net

networks:
  infra_net:
    external: true
