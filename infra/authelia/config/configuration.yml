server:
  host: 0.0.0.0
  port: 9091

log:
  level: info

authentication_backend:
  file:
    path: /config/users.yml
    password:
      algorithm: argon2
      iterations: 3
      memory: 65536
      parallelism: 4
      key_length: 32

session:
  name: authelia_session
  secret: "${AUTHELIA_SESSION_SECRET}"
  expiration: 1h
  inactivity: 5m
  domain: tensaas.es
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: "${AUTHELIA_STORAGE_ENCRYPTION_KEY}"
  local:
    path: /config/db.sqlite3

jwt_secret: "${AUTHELIA_JWT_SECRET}"

identity_validation:
  reset_password:
    jwt_secret: "${AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET}"

access_control:
  default_policy: deny
  rules:
    - domain: "auth.tensaas.es"
      policy: bypass

    # REGLA MAESTRA PARA ADMINS: 2FA EN TODOS LOS SITIOS
    - domain: ["panel.tensaas.es", "grafana.tensaas.es", "portainer.tensaas.es", "*.tensaas.es"]
      subject: "group:admins"
      policy: two_factor

    # REGLAS PARA CLIENTES: 1FA Y SOLO SUS SITIOS
    - domain: "panel.tensaas.es"
      subject: "group:users"
      policy: one_factor

    - domain: ["panaderia.tensaas.es", "*.panaderia.tensaas.es"]
      subject: "group:users"
      policy: one_factor

    - domain: ["btravel.tensaas.es", "*.btravel.tensaas.es"]
      subject: "group:users"
      policy: one_factor

totp:
  issuer: ASIR_SaaS

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

notifier:
  filesystem:
    filename: /config/notification.txt
