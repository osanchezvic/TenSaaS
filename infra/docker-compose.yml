services:
  # --- CONECTOR CLOUDFLARE (EL TÚNEL) ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel
    restart: unless-stopped
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    networks:
      - infra_net

  portainer:
    image: portainer/portainer-ce:2.19.4
    container_name: portainer_global
    restart: unless-stopped
    # PUERTOS CERRADOS: Acceso vía portainer.tensaas.es
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - infra_net

  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: node_exporter_global
    restart: unless-stopped
    # Puerto interno para Prometheus
    expose:
      - "9100"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - infra_net

  prometheus:
    image: prom/prometheus:v2.47.2
    container_name: prometheus_global
    restart: unless-stopped
    # PUERTOS CERRADOS: Acceso vía prometheus.tensaas.es
    expose:
      - "9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./monitorizacion/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - infra_net

  grafana:
    image: grafana/grafana:10.2.2
    container_name: grafana_global
    restart: unless-stopped
    # PUERTOS CERRADOS: Acceso vía grafana.tensaas.es
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_config:/etc/grafana
    depends_on:
      - prometheus
    networks:
      - infra_net

  nginx-proxy-manager:
    image: "jc21/nginx-proxy-manager:latest"
    container_name: nginx_proxy_manager
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81' # Panel de administración NPM
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:81"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      DB_MYSQL_HOST: ${NPM_DB_HOST:-npm_db}
      DB_MYSQL_PORT: ${NPM_DB_PORT:-3306}
      DB_MYSQL_USER: ${NPM_DB_USER:-npm}
      DB_MYSQL_PASSWORD: ${NPM_DB_PASSWORD}
      DB_MYSQL_NAME: ${NPM_DB_NAME:-npm}
    volumes:
      - ./proxy/data:/data
      - ./proxy/letsencrypt:/etc/letsencrypt
    depends_on:
      - npm_db
    networks:
      - infra_net

  npm_db:
    image: "jc21/mariadb-aria:latest"
    container_name: npm_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${NPM_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${NPM_DB_NAME:-npm}
      MYSQL_USER: ${NPM_DB_USER:-npm}
      MYSQL_PASSWORD: ${NPM_DB_PASSWORD}
    volumes:
      - ./proxy/mysql:/var/lib/mysql
    networks:
      - infra_net

  authelia:
    image: authelia/authelia:latest
    container_name: authelia
    restart: unless-stopped
    volumes:
      - ./authelia/config:/config
    networks:
      - infra_net
    environment:
      - TZ=UTC
    expose:
      - 9091

  api:
    build: ./api
    container_name: infra_api
    restart: unless-stopped
    command: ["uvicorn", "infra.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/app
    working_dir: /app
    networks:
      - infra_net
    environment:
      - API_TOKEN=${API_TOKEN}
      - PROJECT_ROOT=/app
      - HOST_PROJECT_ROOT=${HOST_PROJECT_ROOT}
    # PUERTO CERRADO: Comunicación interna con Dashboard vía infra_net:8000

  admin-dashboard:
    build: ./admin-dashboard
    container_name: infra_admin_dashboard
    restart: unless-stopped
    # PUERTO CERRADO: Acceso vía panel.tensaas.es
    expose:
      - "80"
    environment:
      - DB_HOST=infra_users_db
      - DB_NAME=users_db
      - DB_USER=users_user
      - DB_PASSWORD=${DB_PASSWORD}
      - API_TOKEN=${API_TOKEN}
    volumes:
      - ./admin-dashboard:/var/www/html
      - ../catalogo:/var/www/catalogo
    networks:
      - infra_net

  dashy:
    image: lissy93/dashy:latest
    container_name: dashy_portal
    restart: unless-stopped
    # PUERTO CERRADO: Acceso vía portal.tensaas.es
    expose:
      - "8080"
    volumes:
      - ./dashy/conf.yml:/app/public/conf.yml
    networks:
      - infra_net
    healthcheck:
      test: ["CMD", "node", "/app/services/healthcheck.js"]
      interval: 1m
      timeout: 10s
      retries: 3

  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - infra_net

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower_global
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.40
    healthcheck:
      test: ["CMD", "/watchtower", "--version"]
      interval: 1m
      timeout: 10s
      retries: 3
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - infra_net

  fail2ban:
    image: crazymax/fail2ban:1.0.2
    container_name: fail2ban_global
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -f fail2ban-server >/dev/null"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - /var/log:/var/log:ro
      - ./seguridad/fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - fail2ban_data:/var/lib/fail2ban
    environment:
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_PURGE_AGE=30d

volumes:
  portainer_data:
  prometheus_data:
  grafana_data:
  grafana_config:
  fail2ban_data:
  redis_data:

networks:
  infra_net:
    driver: bridge
    name: infra_net
