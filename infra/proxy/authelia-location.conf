# Configuración del "puente" para Authelia
# Este archivo debe ser incluido en la pestaña "Advanced" de Nginx Proxy Manager
# o referenciado en la configuración de Nginx.

set $upstream_authelia http://authelia:9091/api/verify;

location /authelia/api/verify {
    internal;
    proxy_pass $upstream_authelia;
    proxy_set_header Host $host;
    proxy_set_header X-Original-URL https://$http_host$request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Uri $request_uri;
    proxy_set_header X-Forwarded-Ssl on;
    proxy_set_header Content-Length "";
    proxy_pass_request_body off;
}

error_page 401 = @error401;
location @error401 {
    return 302 https://auth.tensaas.es/?rd=https://$http_host$request_uri;
}

auth_request /authelia/api/verify;

auth_request_set $user $upstream_http_remote_user;
auth_request_set $groups $upstream_http_remote_groups;
auth_request_set $name $upstream_http_remote_name;
auth_request_set $email $upstream_http_remote_email;
proxy_set_header Remote-User $user;
proxy_set_header Remote-Groups $groups;
proxy_set_header Remote-Name $name;
proxy_set_header Remote-Email $email;
